<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uktha Admin Dashboard</title>

<style>
body {
  font-family: 'Segoe UI';
  background: #0d0d0d;
  color: white;
  margin:0;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
  background: linear-gradient(90deg,#c9956b,#a07050);
}

/* TABLE */
table {
  width: 95%;
  margin: 20px auto;
  border-collapse: collapse;
  background: #161618;
  border-radius:10px;
  overflow:hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #222;
  text-align:center;
}

th {
  background: #1c1c1e;
  color: #aaa;
}

/* STATUS */
.status {
  padding: 6px;
  border-radius: 20px;
}

.pending { background: rgba(255,193,7,0.2); color:#ffc107; }
.confirmed { background: rgba(76,175,80,0.2); color:#4caf50; }

/* BUTTON */
button {
  padding: 6px 10px;
  border-radius: 6px;
  border:none;
  cursor:pointer;
}

.view { background:#42a5f5; }
.delete { background:red; }

/* SERVICE CARDS */
.services {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
  justify-content:center;
}

.card {
  width:250px;
  background:#161618;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content {
  padding:15px;
}

.card h3 {
  color:#c9956b;
}

/* EMPTY FIELD */
.empty {
  border:1px solid red;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
}

.modal-content {
  background:#1c1c1e;
  padding:20px;
  border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
  table {font-size:12px;}
  .services {flex-direction:column;align-items:center;}
}
</style>
</head>

<body>

<div class="header">💄 Uktha Admin Dashboard</div>

<!-- SERVICES -->
<div class="services">

<div class="card">
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
<div class="card-content">
<h3>Facial</h3>
<p>Cleanup, Glow facial, Bridal facial</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1556228720-195a672e8a03">
<div class="card-content">
<h3>Hair</h3>
<p>Haircut, Smoothening, Coloring</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30">
<div class="card-content">
<h3>Spa</h3>
<p>Relaxing spa, Body massage</p>
</div>
</div>

</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Phone</th>
<th>Service</th>
<th>Date</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<div id="modal-body"></div>
<br>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
const API = "https://your-backend-url"; // CHANGE THIS

async function loadData(){
  const res = await fetch(API + "/bookings");
  const data = await res.json();

  let rows = "";

  data.forEach((b,i)=>{
    rows += `
    <tr>
      <td>${i+1}</td>

      <td class="${!b.name?'empty':''}">${b.name||"Missing"}</td>

      <td>
        <a href="tel:${b.phone}">
        ${b.phone||"Missing"}
        </a>
      </td>

      <td>${b.service||"Missing"}</td>
      <td>${b.date||"Missing"}</td>

      <td>
        <select onchange="updateStatus('${b._id}',this.value)" class="status">
          <option ${b.status=="Pending"?"selected":""}>Pending</option>
          <option ${b.status=="Confirmed"?"selected":""}>Confirmed</option>
        </select>
      </td>

      <td>
        <button class="view" onclick="viewBooking('${b._id}')">👁</button>
        <button class="delete" onclick="deleteBooking('${b._id}')">🗑</button>
      </td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = rows;
}

async function updateStatus(id,status){
  await fetch(`${API}/update/${id}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status})
  });
  loadData();
}

async function viewBooking(id){
  const res = await fetch(API + "/bookings");
  const data = await res.json();
  const b = data.find(x=>x._id===id);

  document.getElementById("modal-body").innerHTML = `
  <p><b>Name:</b> ${b.name}</p>
  <p><b>Phone:</b> <a href="tel:${b.phone}">Call</a></p>
  <p><b>Service:</b> ${b.service}</p>
  <p><b>Date:</b> ${b.date}</p>
  <p><b>Status:</b> ${b.status}</p>
  `;

  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

async function deleteBooking(id){
  if(!confirm("Delete?")) return;

  await fetch(`${API}/delete/${id}`,{method:"DELETE"});
  loadData();
}

loadData();
</script>

</body>
</html>
</html>
